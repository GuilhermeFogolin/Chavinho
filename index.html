<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vila Kombat – O Duelo da Vizinhança</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <h1>Vila Kombat</h1>
            <p>O Duelo da Vizinhança</p>
            <div class="menu-options">
                <button id="btn-1p">1 Jogador</button>
                <button id="btn-2p">2 Jogadores</button>
                <button id="btn-how">Como Jogar</button>
            </div>
        </div>

        <!-- Character Selection -->
        <div id="char-selection" class="overlay hidden">
            <h2>Escolha seu Personagem</h2>
            <div class="char-grid">
                <div class="char-card" data-char="chaves">
                    <img src="assets/chaves.png" alt="Chaves">
                    <span>Chaves</span>
                </div>
                <div class="char-card" data-char="kiko">
                    <img src="assets/kiko.png" alt="Kiko">
                    <span>Kiko</span>
                </div>
                <div class="char-card" data-char="chiquinha">
                    <img src="assets/chiquinha.png" alt="Chiquinha">
                    <span>Chiquinha</span>
                </div>
            </div>
            <div id="selection-status">Selecione P1</div>
        </div>

        <!-- How to Play Overlay -->
        <div id="how-to-play" class="overlay hidden">
            <h2>Como Jogar</h2>
            <div class="controls-info">
                <div class="p-info">
                    <h3>Jogador 1</h3>
                    <p>WASD: Movimento</p>
                    <p>F: Ataque</p>
                </div>
                <div class="p-info">
                    <h3>Jogador 2</h3>
                    <p>Setas: Movimento</p>
                    <p>L: Ataque</p>
                </div>
            </div>
            <button id="btn-back">Voltar</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="health-bar-container p1">
                <div class="name" id="p1-name">Chaves</div>
                <div class="bar"><div id="p1-health" class="health"></div></div>
                <div class="energy"><div id="p1-energy" class="energy-fill"></div></div>
            </div>
            <div id="timer">99</div>
            <div class="health-bar-container p2">
                <div class="name" id="p2-name">Kiko</div>
                <div class="bar"><div id="p2-health" class="health"></div></div>
                <div class="energy"><div id="p2-energy" class="energy-fill"></div></div>
            </div>
        </div>

        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>

        <!-- Final Message -->
        <div id="game-over" class="overlay hidden">
            <h2 id="winner-text">Jogador 1 Venceu!</h2>
            <button onclick="location.reload()">Jogar Novamente</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
